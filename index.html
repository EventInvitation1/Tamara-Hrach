<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noy & Lara - Wedding Invitation</title>
    
    <!-- Premium Typography via Google Fonts supporting Serif, Display, and Script variations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Montserrat:wght@300;400&family=Noto+Serif+Armenian:wght@300;400&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           DESIGN SYSTEM & SPECIFIC PALETTE CONSTANTS
           ========================================================================== */
        :root {
            /* 1. Phone internal screen background color override */
            --bg-cream: #eae5d9;             
            
            /* 5. Custom Envelope Hex Overrides & Lining Properties */
            --env-core: #a8a58d;              /* Required override core hex */
            --env-lining: #dacdb5;           /* Beige interior paper lining from image_2.png */
            --env-shadow-dark: #8c8973;      /* Fold boundary shadow accents */
            --wax-seal-gold: #c3b59b;        /* Champagne gold stamp color tone */
            
            /* Structural Variables */
            --card-base: #fcfbfa;            
            --text-dark: #2c2924;            
            --text-muted: #736d62;           
            
            /* Font Definitions */
            --font-serif: 'Playfair Display', 'Noto Serif Armenian', serif;
            --font-app-url: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        /* ==========================================================================
           RESET & COMPONENT CANVAS WRAPPERS
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1917; /* Dark framing presentation tone for hosting */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: var(--font-serif);
        }

        /* Emulated Mobile Web Browser Viewport Container */
        .phone-viewport {
            width: 100vw;
            height: 100vh;
            max-width: 420px;
            max-height: 860px;
            background-color: var(--bg-cream);
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        /* ==========================================================================
           FEATURE 2: EXTREME TOP ABSOLUTE HEADER PANEL
           ========================================================================== */
        .app-header-url {
            position: absolute;
            top: 40px; /* Shifted elegantly below native status bar heights */
            left: 0;
            width: 100%;
            text-align: center;
            font-family: var(--font-app-url);
            font-size: 0.85rem;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            text-transform: lowercase;
            z-index: 50;
            pointer-events: none;
        }

        /* Phase 1 Overlay Instruction Hint */
        .tap-instruction {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 1.15rem;
            color: var(--text-dark);
            letter-spacing: 0.5px;
            z-index: 40;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            animation: elegantPulse 2.5s infinite ease-in-out;
        }

        @keyframes elegantPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* ==========================================================================
           FEATURE 3 & 4: CENTRALIZED SCALED ENVELOPE STRUCTURAL CLUSTER
           ========================================================================== */
        .envelope-cluster-root {
            position: relative;
            width: 360px;
            height: 240px;
            /* 4. Scaled down to 78% for dynamic padding negative space */
            transform: scale(0.78); 
            transform-origin: center center;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Base Envelope Construction Layer Backing */
        .envelope-pocket-back {
            position: absolute;
            inset: 0;
            background-color: var(--env-core);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(44, 41, 36, 0.12);
            z-index: 5;
        }

        /* Geometrical Pocket Enclosure Flaps styling via modern clip-paths */
        .flap-piece {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
        }

        .left-fold {
            background-color: var(--env-core);
            clip-path: polygon(0 0, 51% 50%, 0 100%);
            filter: brightness(0.96);
        }

        .right-fold {
            background-color: var(--env-core);
            clip-path: polygon(100% 0, 100% 100%, 49% 50%);
            filter: brightness(0.96);
        }

        .bottom-fold {
            background-color: var(--env-core);
            clip-path: polygon(0 100%, 100% 100%, 50% 46%);
            filter: brightness(0.92);
        }

        /* 5. Top Flap configured with realistic shadow projection and a dynamic open tint */
        .top-flap-hinge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--env-lining);
            clip-path: polygon(0 0, 100% 0, 50% 56%);
            transform-origin: top center;
            z-index: 20;
            /* 5. Shadow accent highlighting slightly open physical state gap */
            filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.15));
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.5s ease;
        }

        /* ==========================================================================
           PHASE 3: POP-OUT REVELATION INNER COLLAGE ELEMENTS
           ========================================================================== */
        .invitation-inner-content {
            position: absolute;
            inset: 5px 15px;
            z-index: 10;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateY(0);
        }

        /* Core Rectangle Save The Date Layout Card */
        .rect-save-date-card {
            position: absolute;
            right: 0;
            top: -15px;
            width: 145px;
            height: 215px;
            background-color: var(--card-base);
            padding: 16px 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #f2eee5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card-std-tag {
            font-family: var(--font-sans);
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-names {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-dark);
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .card-date {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 400;
            border-top: 1px solid #e2ded4;
            border-bottom: 1px solid #e2ded4;
            padding: 4px 0;
            width: 90%;
            letter-spacing: 1px;
            color: var(--text-dark);
        }

        /* Vinyl Record Decorative Graphic Asset Plate */
        .vinyl-record-disc {
            position: absolute;
            left: -5px;
            top: 15px;
            width: 125px;
            height: 125px;
            border-radius: 50%;
            background: radial-gradient(circle, #2d2a24 20%, #1a1815 21%, #282520 40%, #11100e 41%, #221f1a 70%);
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vinyl-inner-label {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: var(--bg-cream);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Small White Oval Monogram Initials Frame */
        .oval-monogram-badge {
            position: absolute;
            top: 25px;
            left: 80px;
            width: 90px;
            height: 120px;
            border: 2px solid #e6dfd3;
            outline: 1px solid var(--text-muted);
            outline-offset: -4px;
            border-radius: 50%;
            background-color: var(--card-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .monogram-text {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: var(--text-dark);
            line-height: 1;
        }
        
        .monogram-divider {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: 1px 0;
        }

        /* Polaroid Couple Framed Elements Layout Stack Overlap */
        .polaroid-wrapper {
            position: absolute;
            background-color: #ffffff;
            padding: 6px 6px 16px 6px;
            box-shadow: 0 8px 20px rgba(44, 41, 36, 0.08);
            border: 1px solid #f5f2eb;
        }

        .polaroid-wrapper img {
            width: 100%;
            height: 82%;
            object-fit: cover;
        }

        .polaroid-left {
            width: 110px;
            height: 120px;
            left: -20px;
            bottom: -35px;
            transform: rotate(-8deg);
        }

        .polaroid-right {
            width: 115px;
            height: 115px;
            left: 75px;
            bottom: -50px;
            transform: rotate(4deg);
        }

        /* Elegant Ornate Initials Golden Stamp/Seal Placement */
        .golden-wax-seal {
            position: absolute;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background-color: var(--wax-seal-gold);
            border-radius: 50%;
            z-index: 30;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 0.75rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* ==========================================================================
           ANIMATED EXPANSION OVERRIDE INTERACTION ENGINE
           ========================================================================== */
        
        /* Actions triggered when state transitions to active (.is-open) */
        .phone-viewport.is-open .tap-instruction {
            opacity: 0;
            pointer-events: none;
        }

        /* Central Scale Adjustment on Open: Elevates presence to fit canvas width gracefully */
        .phone-viewport.is-open .envelope-cluster-root {
            transform: scale(0.95) translateY(40px);
        }

        /* 3D Flap opens completely up and projects inverted background shadow positioning */
        .phone-viewport.is-open .top-flap-hinge {
            transform: rotateX(180deg);
            z-index: 8;
            filter: drop-shadow(0 -5px 6px rgba(0, 0, 0, 0.08));
        }

        /* Seal gracefully drops out of spatial visibility context */
        .phone-viewport.is-open .golden-wax-seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.6);
            pointer-events: none;
        }

        /* Cluster elements travel fluidly vertically outside the envelope slot container pocket */
        .phone-viewport.is-open .invitation-inner-content {
            transform: translateY(-135px);
        }

        /* Extended Armenian Detail Panel inside viewport container */
        .expanded-details-panel {
            position: absolute;
            bottom: -120px;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 0 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
            pointer-events: none;
        }

        .phone-viewport.is-open .expanded-details-panel {
            opacity: 1;
            transform: translateY(0);
            bottom: 45px;
        }

        .expanded-details-panel p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-dark);
        }
        
        .venue-tag {
            font-size: 0.85rem;
            font-style: italic;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Emulated Mobile Device Housing -->
    <div class="phone-viewport" id="appCanvas">
        
        <!-- Feature 2: Clean Elegant URL Header Branding -->
        <div class="app-header-url">noy-lara.web.app</div>

        <!-- Dynamic Invitation Interaction Trigger Element -->
        <div class="tap-instruction" id="tapText">Սեղմեք՝ բացելու համար</div>

        <!-- Feature 3 & 4: Symmetrical Central Enclosure Cluster -->
        <div class="envelope-cluster-root" id="envelopeContainer">
            
            <!-- Structural Layer Backing Pocket -->
            <div class="envelope-pocket-back"></div>

            <!-- Pop-Out Element Array Cluster (Flies upwards out of card core) -->
            <div class="invitation-inner-content">
                
                <!-- Vinyl Decorative Disc Element -->
                <div class="vinyl-record-disc">
                    <div class="vinyl-inner-label"></div>
                </div>

                <!-- Oval Initials Monogram Cluster -->
                <div class="oval-monogram-badge">
                    <span class="monogram-text">N</span>
                    <span class="monogram-divider">&</span>
                    <span class="monogram-text">L</span>
                </div>

                <!-- Main Save the Date Structural Rectangular Card -->
                <div class="rect-save-date-card">
                    <span class="card-std-tag">Save the date</span>
                    <h2 class="card-names">Noy<br>&<br>Lara</h2>
                    <div class="card-date">12 AUGUST 2025</div>
                </div>

                <!-- Stacked Polaroid Couple Photographic Layout Slots -->
                <div class="polaroid-wrapper polaroid-left">
                    <img src="photo1.jpg" alt="Couple Portrait One" onerror="this.src='https://picsum.photos/120/140?blur=3'">
                </div>
                
                <div class="polaroid-wrapper polaroid-right">
                    <img src="photo2.jpg" alt="Couple Portrait Two" onerror="this.src='https://picsum.photos/120/140?sepia=1'">
                </div>

            </div>

            <!-- Foreground Pocket Enclosure Flaps -->
            <div class="flap-piece left-fold"></div>
            <div class="flap-piece right-fold"></div>
            <div class="flap-piece bottom-fold"></div>

            <!-- Feature 5: Top Folding Hinge Layer & Shadow Components -->
            <div class="top-flap-hinge"></div>

            <!-- Golden Initial Accent Wax Seal Layer -->
            <div class="golden-wax-seal">N & L</div>

        </div>

        <!-- Extended Detail Layout Module (Fades in neatly beneath cluster once opened) -->
        <div class="expanded-details-panel">
            <p>
                Սիրով հրավիրում ենք ձեզ կիսելու մեր կյանքի ամենահիշարժան օրվա բերկրանքը
                <span class="venue-tag">Ժամը՝ 17:00-ին, Ռեստորանային համալիր, Երևան</span>
            </p>
        </div>

    </div>

    <!-- ==========================================================================
       LIGHTWEIGHT PERFORMANCE STATE APPLICATION MOTOR
       ========================================================================== */ -->
    <script>
        document.getElementById('appCanvas').addEventListener('click', function() {
            const canvasElement = document.getElementById('appCanvas');
            
            // Toggle web presentation state model fluidly via classes
            if (!canvasElement.classList.contains('is-open')) {
                canvasElement.classList.add('is-open');
            }
        });
    </script>
</body>
</html>
