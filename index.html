<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    
    <!-- Google Fonts for premium cursive styling and proper Unicode Armenian alignment -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Noto+Serif+Armenian:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           DESIGN SYSTEM CONSTANTS
           ========================================================================== */
        :root {
            --bg-cream: #f6f3eb;          /* Pristine off-white/light cream layout background */
            --text-dark: #2d2a24;         /* Premium low-contrast dark charcoal */
            --font-cursive: 'Marck Script', cursive;
            --font-armenian: 'Noto Serif Armenian', serif;
        }

        /* ==========================================================================
           BASE LAYOUT & SCREEN CENTERING
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-cream);
            font-family: var(--font-armenian);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fully Responsive Outer Container Framework */
        .stage-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Elegant Presentation Frame for Desktop Monitors */
        @media (min-width: 769px) {
            .stage-container {
                max-width: 450px;
                max-height: 880px;
                height: 90vh;
                border-radius: 24px;
                background-color: #faf8f5;
                box-shadow: 0 30px 70px rgba(45, 42, 36, 0.08);
                border: 1px solid rgba(0, 0, 0, 0.02);
            }
        }

        /* ==========================================================================
           PHASE 1: INITIAL CLOSED STATE
           ========================================================================== */
        .initial-state-wrapper {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 320px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 30;
            cursor: pointer;
        }

        /* Verbatim Armenian Cursive Callout */
        .instruction-overlay {
            font-family: var(--font-cursive);
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 25px;
            text-align: center;
            user-select: none;
            animation: gentleFloat 3s infinite ease-in-out;
        }

        .closed-envelope-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.06));
            animation: softPulse 3s infinite ease-in-out;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* ==========================================================================
           PHASE 2 & 3: REVELATION ENVELOPE & COLLAGE
           ========================================================================== */
        .reveal-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        /* Positioned slightly higher on the screen for compositional breathing room */
        .open-envelope-base {
            position: absolute;
            width: 85%;
            max-width: 340px;
            height: auto;
            top: 12%;
            transform: translateY(0);
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.04));
            z-index: 1;
        }

        /* Shared structural settings for entering components */
        .collage-asset {
            position: absolute;
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            will-change: transform, opacity;
        }

        /* Global Dynamic Entrance Motor Triggered via App State */
        .stage-container.is-active .reveal-canvas {
            opacity: 1;
            pointer-events: auto;
        }

        .stage-container.is-active .collage-asset {
            animation: popInReveal 0.85s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes popInReveal {
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(var(--target-rotation, 0deg));
            }
        }

        /* Precise Placement Coordinates Mapping directly to Design Blueprint Layout */
        
        .asset-vinyl {
            width: 120px;
            left: calc(50% - 145px);
            top: 32%;
            z-index: 3;
            animation-delay: 0.3s;
        }

        /* Continuous Infinite Ambient Spinning Motor */
        .vinyl-spin-layer {
            width: 100%;
            height: auto;
            display: block;
            animation: continuousGroove 20s linear infinite;
        }

        @keyframes continuousGroove {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .asset-card {
            width: 165px;
            right: calc(50% - 150px);
            top: 30%;
            z-index: 2;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.04));
            animation-delay: 0.5s;
        }

        .asset-sticker {
            width: 85px;
            left: calc(50% - 42px);
            top: 38%;
            z-index: 5;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.03));
            animation-delay: 0.7s;
        }

        /* Asymmetric Polaroids Layer Array Stack */
        .asset-photo-vertical {
            width: 120px;
            left: calc(50% - 140px);
            top: 48%;
            z-index: 6;
            filter: drop-shadow(0 12px 25px rgba(45,42,36,0.1));
            --target-rotation: -7deg;
            animation-delay: 0.9s;
        }

        .asset-photo-horizontal {
            width: 135px;
            right: calc(50% - 130px);
            top: 52%;
            z-index: 7;
            filter: drop-shadow(0 12px 25px rgba(45,42,36,0.15));
            --target-rotation: 4deg;
            animation-delay: 1.1s;
        }

        /* Responsive Scaling Tuning Modifiers for Compact Mobile Screen Heights */
        @media (max-height: 720px) {
            .open-envelope-base { top: 8%; width: 75%; }
            .asset-vinyl { width: 100px; left: calc(50% - 120px); top: 28%; }
            .asset-card { width: 140px; right: calc(50% - 125px); top: 26%; }
            .asset-sticker { width: 75px; left: calc(50% - 37px); top: 33%; }
            .asset-photo-vertical { width: 105px; left: calc(50% - 120px); top: 43%; }
            .asset-photo-horizontal { width: 115px; right: calc(50% - 110px); top: 46%; }
        }
    </style>
</head>
<body>

    <div class="stage-container" id="interactionStage">
        
        <!-- Phase 1: Closed Envelope Framework -->
        <div class="initial-state-wrapper" id="closedWrapper">
            <h1 class="instruction-overlay">Սեղմեք՝ բացելու համար</h1>
            <img src="front.png" alt="Closed Invitation Envelope" class="closed-envelope-img">
        </div>

        <!-- Phase 2 & 3: Open Canvas Space & Asset Stacks -->
        <div class="reveal-canvas">
            
            <!-- Swapped Background Open Template Target Base -->
            <img src="opened.png" alt="Open Envelope Background" class="open-envelope-base">

            <!-- Staggered Layer Elements Portfolio -->
            
            <!-- 1. The Rotating Vinyl Asset Layer -->
            <div class="collage-asset asset-vinyl">
                <img src="vinil.png" alt="Spinning Vinyl Soundtrack Record" class="vinyl-spin-layer">
            </div>

            <!-- 2. Main Save the Date Structural Text Card -->
            <img src="savethedate.png" alt="Save The Date Information Card" class="collage-asset asset-card">

            <!-- 3. Monogram Floral Accent Sticker Frame -->
            <img src="initials.png" alt="Floral Initials Oval Sticker" class="collage-asset asset-sticker">

            <!-- 4. Stacked Asymmetric Portrait Polaroids Layers -->
            <img src="vertical.jpeg" alt="Couple Polaroid Vertical Capture" class="collage-asset asset-photo-vertical">
            <img src="horizontal.jpeg" alt="Couple Polaroid Horizontal Capture" class="collage-asset asset-photo-horizontal">

        </div>

    </div>

    <!-- ==========================================================================
       VANILLA EMBEDDED ENGINE CONTROL
       ========================================================================== */ -->
    <script>
        const stage = document.getElementById('interactionStage');
        const closedWrapper = document.getElementById('closedWrapper');

        // Capture touch or click anywhere inside execution screen
        document.body.addEventListener('click', function initiateOpenSequence() {
            // Unbind subsequent listener triggers to secure transition runtime
            document.body.removeEventListener('click', initiateOpenSequence);
            
            // Phase 2: Fade out initial elements completely
            closedWrapper.style.opacity = '0';
            closedWrapper.style.transform = 'translateY(-15px)';
            
            setTimeout(() => {
                closedWrapper.remove(); // Safely clear closed state from layout calculations
                
                // Phase 3: Transition state to active to ignite staggered CSS frames
                stage.classList.add('is-active');
            }, 400); // Perfectly synced to matching CSS 0.4s opacity duration
        });
    </script>
</body>
</html>
